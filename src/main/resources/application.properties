spring.application.name=storage-service
server.port=${SERVER_PORT:8087}

# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET:sanosysalvos-media}
aws.s3.region=${AWS_S3_REGION:us-east-1}
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}

# JWT
jwt.secret=${JWT_SECRET:c2Fub3N5c2Fsdm9zLXNlY3JldC1rZXktcGFyYS1qd3QtMjAyNg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.datasource.url=${STORAGE_DB_URL:jdbc:postgresql://localhost:5432/sanosysalvos}
spring.datasource.username=${STORAGE_DB_USER:postgres}
spring.datasource.password=${STORAGE_DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB