name: CI/CD - Build, Push and Deploy

on:
  push:
    branches: [dev, main]

jobs:
  build-and-push:
    name: Build and Push to DockerHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sanosysalvos-storage-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_BACK_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          proxy_host: ${{ secrets.EC2_FRONT_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_PEM_KEY }}
          envs: DOCKERHUB_USERNAME,JWT_SECRET,AWS_ACCESS_KEY,AWS_SECRET_KEY
          script: |
            sudo docker stop sanosysalvos-storage-service 2>/dev/null || true
            sudo docker rm sanosysalvos-storage-service 2>/dev/null || true
            sudo docker pull ${DOCKERHUB_USERNAME}/sanosysalvos-storage-service:latest
            sudo docker run -d \
              --name sanosysalvos-storage-service \
              --network sanosysalvos-network \
              --restart unless-stopped \
              -p 8087:8087 \
              -e 'JWT_SECRET='${JWT_SECRET} \
              -e AWS_ACCESS_KEY=${AWS_ACCESS_KEY} \
              -e AWS_SECRET_KEY=${AWS_SECRET_KEY} \
              -e AWS_S3_BUCKET=sanosysalvos-media \
              -e AWS_S3_REGION=us-east-1 \
              -e EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/ \
              ${DOCKERHUB_USERNAME}/sanosysalvos-storage-service:latest
            sudo docker image prune -f