name: CI/CD - Build, Push and Deploy

on:
  push:
    branches: [dev, main]

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run unit tests
        run: mvn test --no-transfer-progress

      - name: Publish test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-storage
          path: target/surefire-reports/*.xml

  build-and-push:
    name: Build and Push to DockerHub
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sanosysalvos-storage-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_BACK_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PEM_KEY }}
          proxy_host: ${{ secrets.EC2_FRONT_HOST }}
          proxy_username: ${{ secrets.EC2_USER }}
          proxy_key: ${{ secrets.EC2_PEM_KEY }}
          envs: DOCKERHUB_USERNAME,DB_USER,DB_PASSWORD,JWT_SECRET,AWS_ACCESS_KEY,AWS_SECRET_KEY
          script: |
            export PATH=$PATH:/usr/bin:/usr/local/bin

            if ! sudo /usr/bin/docker info &> /dev/null; then
              sudo dnf update -y -q
              sudo dnf install -y -q docker
              sudo systemctl enable --now docker
              sudo usermod -aG docker ec2-user
              COMPOSE_VERSION=$(curl -s https://api.github.com/repos/docker/compose/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -SL "https://github.com/docker/compose/releases/download/${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              sudo systemctl restart docker
            fi

            sudo docker stop sanosysalvos-storage-service 2>/dev/null || true
            sudo docker rm sanosysalvos-storage-service 2>/dev/null || true
            sudo docker pull ${DOCKERHUB_USERNAME}/sanosysalvos-storage-service:latest

            sudo docker run -d \
              --name sanosysalvos-storage-service \
              --network sanosysalvos-network \
              --restart unless-stopped \
              -p 8087:8087 \
              -e JWT_SECRET=${JWT_SECRET} \
              -e AWS_ACCESS_KEY=${AWS_ACCESS_KEY} \
              -e AWS_SECRET_KEY=${AWS_SECRET_KEY} \
              -e AWS_S3_BUCKET=sanosysalvos-media \
              -e AWS_S3_REGION=us-east-1 \
              -e STORAGE_DB_URL=jdbc:postgresql://postgres:5432/sanosysalvos \
              -e STORAGE_DB_USER=${DB_USER} \
              -e STORAGE_DB_PASSWORD=${DB_PASSWORD} \
              -e EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/ \
              ${DOCKERHUB_USERNAME}/sanosysalvos-storage-service:latest

            sudo docker image prune -f